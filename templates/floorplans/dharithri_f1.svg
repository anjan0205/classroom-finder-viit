<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg"
     style="width:100%;height:auto;background:#1a1a2e;">

  <defs>
    <style>
      .room { fill:#16213e; stroke:#378ADD; stroke-width:1.5; rx:4; }
      .room-label { fill:#90caf9; font-size:11px; font-family:sans-serif;
                    text-anchor:middle; dominant-baseline:central; }
      .room-highlight { fill:#e53935 !important; stroke:#ff6b6b !important; stroke-width:2; }
      .corridor { fill:#0d1b2a; stroke:#2a3f5f; stroke-width:1; }
      .staircase { fill:#4a148c; stroke:#7b1fa2; stroke-width:1.5; }
      .lift { fill:#1565C0; stroke:#1976D2; stroke-width:1.5; }
    </style>
  </defs>

  <rect x="20" y="20" width="760" height="360" rx="8" fill="none" stroke="#378ADD" stroke-width="2"/>

  <!-- Left wing (DB side) -->
  <rect id="DB-11" class="room" x="30" y="30" width="100" height="80"/>
  <text class="room-label" x="80" y="75">DB-11</text>
  <rect id="DB-12" class="room" x="140" y="30" width="100" height="80"/>
  <text class="room-label" x="190" y="75">DB-12</text>
  <rect id="DB-13" class="room" x="250" y="30" width="100" height="80"/>
  <text class="room-label" x="300" y="75">DB-13</text>
  <rect id="DB-14" class="room" x="30" y="120" width="150" height="70"/>
  <text class="room-label" x="105" y="155">DB-14</text>
  <rect id="DB-15" class="room" x="190" y="120" width="160" height="70"/>
  <text class="room-label" x="270" y="155">DB-15</text>

  <rect class="staircase" x="360" y="30" width="60" height="80" rx="4"/>
  <rect class="lift" x="430" y="30" width="40" height="40" rx="4"/>

  <!-- Right wing (DA side) -->
  <rect id="DA-11" class="room" x="520" y="30" width="110" height="80"/>
  <text class="room-label" x="575" y="75">DA-11</text>
  <rect id="DA-12" class="room" x="640" y="30" width="130" height="80"/>
  <text class="room-label" x="705" y="75">DA-12</text>
  <rect id="DA-13" class="room" x="520" y="120" width="120" height="70"/>
  <text class="room-label" x="580" y="155">DA-13</text>
  <rect id="DA-14" class="room" x="650" y="120" width="120" height="70"/>
  <text class="room-label" x="710" y="155">DA-14</text>

  <rect class="corridor" x="20" y="200" width="760" height="30"/>
  <text fill="#4a6fa5" font-size="10px" font-family="sans-serif" text-anchor="middle" x="400" y="218">CORRIDOR</text>

  <text fill="#378ADD" font-size="14px" font-family="sans-serif" font-weight="bold" text-anchor="middle" x="400" y="355">
    DHARITHRI BLOCK — FIRST FLOOR
  </text>
</svg>
