<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg"
     style="width:100%;height:auto;background:#1a1a2e;">

  <defs>
    <style>
      .room { fill:#16213e; stroke:#378ADD; stroke-width:1.5; rx:4; }
      .room-label { fill:#90caf9; font-size:11px; font-family:sans-serif;
                    text-anchor:middle; dominant-baseline:central; }
      .room-highlight { fill:#e53935 !important; stroke:#ff6b6b !important; stroke-width:2; }
      .corridor { fill:#0d1b2a; stroke:#2a3f5f; stroke-width:1; }
      .staircase { fill:#4a148c; stroke:#7b1fa2; stroke-width:1.5; }
      .lift { fill:#1565C0; stroke:#1976D2; stroke-width:1.5; }
    </style>
  </defs>

  <rect x="20" y="20" width="760" height="360" rx="8" fill="none" stroke="#378ADD" stroke-width="2"/>

  <!-- Left wing (DB-21-25) -->
  <rect id="DB-21" class="room" x="30" y="30" width="80" height="80"/>
  <text class="room-label" x="70" y="75">DB-21</text>
  <rect id="DB-22" class="room" x="120" y="30" width="80" height="80"/>
  <text class="room-label" x="160" y="75">DB-22</text>
  <rect id="DB-23" class="room" x="210" y="30" width="80" height="80"/>
  <text class="room-label" x="250" y="75">DB-23</text>
  <rect id="DB-24" class="room" x="30" y="120" width="130" height="70"/>
  <text class="room-label" x="95" y="155">DB-24</text>
  <rect id="DB-25" class="room" x="170" y="120" width="180" height="70"/>
  <text class="room-label" x="260" y="155">DB-25</text>

  <rect class="staircase" x="360" y="30" width="60" height="80" rx="4"/>
  <rect class="lift" x="430" y="30" width="40" height="40" rx="4"/>

  <!-- Right wing (DA-21-27) -->
  <rect id="DA-21" class="room" x="520" y="30" width="60" height="80"/>
  <text class="room-label" x="550" y="75">DA-21</text>
  <rect id="DA-22" class="room" x="590" y="30" width="60" height="80"/>
  <text class="room-label" x="620" y="75">DA-22</text>
  <rect id="DA-23" class="room" x="660" y="30" width="60" height="80"/>
  <text class="room-label" x="690" y="75">DA-23</text>
  <rect id="DA-24" class="room" x="730" y="30" width="40" height="80"/>
  <text class="room-label" x="750" y="75">DA-24</text>
  
  <rect id="DA-25" class="room" x="520" y="120" width="80" height="70"/>
  <text class="room-label" x="560" y="155">DA-25</text>
  <rect id="DA-26" class="room" x="610" y="120" width="80" height="70"/>
  <text class="room-label" x="650" y="155">DA-26</text>
  <rect id="DA-27" class="room" x="700" y="120" width="70" height="70"/>
  <text class="room-label" x="735" y="155">DA-27</text>

  <rect class="corridor" x="20" y="200" width="760" height="30"/>
  <text fill="#4a6fa5" font-size="10px" font-family="sans-serif" text-anchor="middle" x="400" y="218">CORRIDOR</text>

  <text fill="#378ADD" font-size="14px" font-family="sans-serif" font-weight="bold" text-anchor="middle" x="400" y="355">
    DHARITHRI BLOCK — SECOND FLOOR
  </text>
</svg>
