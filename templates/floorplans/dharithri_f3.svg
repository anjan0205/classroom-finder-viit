<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg"
     style="width:100%;height:auto;background:#1a1a2e;">

  <defs>
    <style>
      .room { fill:#16213e; stroke:#378ADD; stroke-width:1.5; rx:4; }
      .room-label { fill:#90caf9; font-size:11px; font-family:sans-serif;
                    text-anchor:middle; dominant-baseline:central; }
      .room-highlight { fill:#e53935 !important; stroke:#ff6b6b !important; stroke-width:2; }
      .corridor { fill:#0d1b2a; stroke:#2a3f5f; stroke-width:1; }
      .staircase { fill:#4a148c; stroke:#7b1fa2; stroke-width:1.5; }
      .lift { fill:#1565C0; stroke:#1976D2; stroke-width:1.5; }
    </style>
  </defs>

  <rect x="20" y="20" width="760" height="360" rx="8" fill="none" stroke="#378ADD" stroke-width="2"/>

  <!-- Left wing (DB-31-37) -->
  <rect id="DB-31" class="room" x="30" y="30" width="60" height="80"/>
  <text class="room-label" x="60" y="75">DB-31</text>
  <rect id="DB-32" class="room" x="100" y="30" width="60" height="80"/>
  <text class="room-label" x="130" y="75">DB-32</text>
  <rect id="DB-33" class="room" x="170" y="30" width="60" height="80"/>
  <text class="room-label" x="200" y="75">DB-33</text>
  <rect id="DB-34" class="room" x="240" y="30" width="60" height="80"/>
  <text class="room-label" x="270" y="75">DB-34</text>
  <rect id="DB-35" class="room" x="310" y="30" width="40" height="80"/>
  <text class="room-label" x="330" y="75">DB-35</text>
  <rect id="DB-36" class="room" x="30" y="120" width="150" height="70"/>
  <text class="room-label" x="105" y="155">DB-36</text>
  <rect id="DB-37" class="room" x="190" y="120" width="160" height="70"/>
  <text class="room-label" x="270" y="155">DB-37</text>

  <rect class="staircase" x="360" y="30" width="60" height="80" rx="4"/>
  <rect class="lift" x="430" y="30" width="40" height="40" rx="4"/>

  <!-- Right wing (DA-31-38) -->
  <rect id="DA-31" class="room" x="520" y="30" width="50" height="80"/>
  <text class="room-label" x="545" y="75">DA-31</text>
  <rect id="DA-32" class="room" x="580" y="30" width="50" height="80"/>
  <text class="room-label" x="605" y="75">DA-32</text>
  <rect id="DA-33" class="room" x="640" y="30" width="60" height="80"/>
  <text class="room-label" x="670" y="75">DA-33</text>
  <rect id="DA-34" class="room" x="710" y="30" width="60" height="80"/>
  <text class="room-label" x="740" y="75">DA-34</text>
  <rect id="DA-35" class="room" x="520" y="120" width="60" height="70"/>
  <text class="room-label" x="550" y="155">DA-35</text>
  <rect id="DA-36" class="room" x="590" y="120" width="60" height="70"/>
  <text class="room-label" x="620" y="155">DA-36</text>
  <rect id="DA-37" class="room" x="660" y="120" width="50" height="70"/>
  <text class="room-label" x="685" y="155">DA-37</text>
  <rect id="DA-38" class="room" x="720" y="120" width="50" height="70"/>
  <text class="room-label" x="745" y="155">DA-38</text>

  <rect class="corridor" x="20" y="200" width="760" height="30"/>
  <text fill="#4a6fa5" font-size="10px" font-family="sans-serif" text-anchor="middle" x="400" y="218">CORRIDOR</text>

  <text fill="#378ADD" font-size="14px" font-family="sans-serif" font-weight="bold" text-anchor="middle" x="400" y="355">
    DHARITHRI BLOCK — THIRD FLOOR
  </text>
</svg>
